<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing...</title>
    <script>
        // This page handles callbacks from Colab
        // Colab will redirect to: https://Danielzapirtan.github.io/isplit		/notify?sessionId=XXX&stage=splitting&detail=Processing...&percent=50
        // Or for completion: https://Danielzapirtan.github.io/isplit		/notify?sessionId=XXX&driveUrl=https://drive.google.com/...
        
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('sessionId');
        const driveUrl = params.get('driveUrl');
        const stage = params.get('stage');
        const detail = params.get('detail');
        const percent = params.get('percent');
        
        if (sessionId) {
            if (driveUrl) {
                // Completion notification
                localStorage.setItem(`complete_${sessionId}`, JSON.stringify({
                    driveFolderUrl: driveUrl
                }));
            } else if (stage) {
                // Progress update
                localStorage.setItem(`progress_${sessionId}`, JSON.stringify({
                    stage: stage,
                    detail: detail || '',
                    percent: parseInt(percent) || 0
                }));
            }
            
            // Redirect back to main page
            window.location.href = '/';
        }
    </script>
</head>
<body>
    <p>Processing... Redirecting back to app.</p>
</body>
</html>
